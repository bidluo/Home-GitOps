apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: hoarder
spec:
  interval: 5m
  chart:
    spec:
      chart: app-template
      version: 5.0.1
      sourceRef:
        kind: HelmRepository
        name: bjw-s-charts
        namespace: flux-system
  values:
    controllers:
      main:
        containers:
          main:
            image:
              repository: ghcr.io/karakeep-app/karakeep
              tag: 0.32.0
            envFrom:
              - secretRef:
                  name: hoarder-secrets
      meili:
        containers:
          main:
            image:
              repository: getmeili/meilisearch
              tag: v1.48.3
            env:
              # v1.48 refuses to start on a v1.34 database. This performs an
              # in-place migration on startup (Meilisearch >=1.12). Safe to
              # remove once the meili-data volume has been migrated to 1.48.
              MEILI_EXPERIMENTAL_DUMPLESS_UPGRADE: "true"
            envFrom:
              - secretRef:
                  name: hoarder-secrets
    service:
      main:
        controller: main
        ports:
          http:
            port: 3000
      meili:
        controller: meili
        ports:
          http:
            port: 7700
    persistence:
      hoarder-data:
        existingClaim: hoarder-data
        advancedMounts:
          main: 
            main:
              - path: /data
      meili-data:
        existingClaim: meili-data
        advancedMounts:
          meili: 
            main:
              - path: /meili_data