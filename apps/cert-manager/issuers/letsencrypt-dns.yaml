---
# DNS-01 issuer (Cloudflare) — for internal-only hostnames (e.g. *.i.liaw.me) that
# never resolve publicly, so HTTP-01 can't validate them.
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-dns
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: "${PRIMARY_EMAIL}"
    privateKeySecretRef:
      name: letsencrypt-dns
    solvers:
      - dns01:
          cloudflare:
            apiTokenSecretRef:
              name: cloudflare-api-token
              key: api-token
