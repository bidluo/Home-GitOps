---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: sons-of-the-forest
spec:
  interval: 5m
  chart:
    spec:
      chart: app-template
      version: 5.0.1
      sourceRef:
        kind: HelmRepository
        name: bjw-s-charts
        namespace: flux-system
  values:
    defaultPodOptions:
      # hostNetwork: bind koko-bravo's real IP (192.168.1.152) directly — no
      # metallb LB, no kube-proxy SNAT. SotF then sees/advertises a reachable
      # address, which the LoadBalancer + SNAT path broke (server showed in the
      # Steam browser but "Connect" pointed at a dead/SNAT'd address).
      # Pinned to koko-bravo so the connect IP is stable.
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      nodeSelector:
        kubernetes.io/hostname: koko-bravo
      # Windows dedicated server under Wine — heavy; keep it on the bigger
      # worker (koko-bravo), not the 16Gi control-plane node.
      # Image runs as PUID/PGID 1000; fsGroup makes the data PVC writable.
      securityContext:
        fsGroup: 1000
    controllers:
      main:
        # SteamCMD download + Wine startup is slow; give it room and don't
        # thrash-restart while it provisions on first boot.
        strategy: Recreate
        initContainers:
          # The server advertises whatever ports its cfg holds, but playit hands
          # out fixed public ports (55722-55724 range tunnel on one IP). Force the
          # cfg's ports to match the public ports so the query->game->blob handoff
          # stays on the same address. Idempotent; runs before the game reads cfg.
          # The image only creates the cfg if missing, so it won't clobber this.
          config-ports:
            image:
              repository: busybox
              tag: "1.38"
            command:
              - sh
              - -c
              - |
                cfg=/sonsoftheforest/userdata/dedicatedserver.cfg
                if [ -f "$cfg" ]; then
                  sed -i \
                    -e 's/"QueryPort": [0-9]*/"QueryPort": 55722/' \
                    -e 's/"GamePort": [0-9]*/"GamePort": 55723/' \
                    -e 's/"BlobSyncPort": [0-9]*/"BlobSyncPort": 55724/' \
                    "$cfg"
                  echo "patched ports in $cfg:"; grep -E '"(Query|Game|BlobSync)Port"' "$cfg"
                else
                  echo "cfg not present yet; main container will create it (first boot)"
                fi
        containers:
          main:
            image:
              repository: docker.io/jammsen/sons-of-the-forest-dedicated-server
              tag: latest
            env:
              PUID: "1000"
              PGID: "1000"
              ALWAYS_UPDATE_ON_START: "true"
              SKIP_NETWORK_ACCESSIBILITY_TEST: "true"
            resources:
              requests:
                cpu: 500m
                memory: 3Gi
              limits:
                cpu: "4"
                memory: 8Gi
    service:
      # Disabled: with hostNetwork the server binds koko-bravo (192.168.1.152)
      # directly, so the LoadBalancer/metallb path (and its SNAT) is bypassed.
      # Reachable at 192.168.1.152:55722 (query) / :55723 (game) / :55724 (blob).
      main:
        enabled: false
    persistence:
      data:
        existingClaim: sons-of-the-forest-data
        globalMounts:
          - path: /sonsoftheforest
