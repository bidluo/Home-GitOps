---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/postgresql.cnpg.io/cluster_v1.json
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: immich-pg
spec:
  instances: 1
  primaryUpdateStrategy: unsupervised
  # pgvecto.rs image + preloaded `vectors` — required by Immich (matches the old data-cluster).
  imageName: ghcr.io/tensorchord/cloudnative-pgvecto.rs:14-v0.3.0
  storage:
    size: 10Gi
    storageClass: longhorn-xfs
  # NO HA for this cluster (unlike the others): pgvecto.rs stores vector-index
  # segments under pg_vectors/ with paths too long for the tar format pg_basebackup
  # uses to clone a replica ("file name too long for tar format"), so CNPG cannot
  # build a streaming standby. Stays single-instance; durability = Longhorn
  # replication + B2 backups.
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      memory: 1536Mi
  postgresql:
    shared_preload_libraries:
      - "vectors"
      - "cube"
      - "earthdistance"
  bootstrap:
    initdb:
      database: immich
      owner: immich
      secret:
        name: immich-pg-owner
  # Second database (immich-secondary / "lotus") lives in the same pgvecto cluster.
  managed:
    roles:
      - name: limmich
        ensure: present
        login: true
        passwordSecret:
          name: limmich-pg-owner
  # Backups via the Barman Cloud Plugin -> shared ObjectStore `cnpg-b2`.
  # serverName preserved (immich-pg) so this continues the existing B2 stream.
  plugins:
    - name: barman-cloud.cloudnative-pg.io
      isWALArchiver: true
      parameters:
        barmanObjectName: cnpg-b2
        serverName: immich-pg
