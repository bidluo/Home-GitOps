---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: minecraft 
spec:
  interval: 5m
  chart:
    spec:
      chart: app-template
      version: 5.0.1
      sourceRef:
        kind: HelmRepository
        name: bjw-s-charts
        namespace: flux-system
  values:
    defaultPodOptions:
      nodeSelector:
        node-role.kubernetes.io/master: "true"
    controllers:
      main:
        containers:
          main:
            image:
              repository: ghcr.io/itzg/minecraft-server
              # Was `java23`, which itzg froze at 2025-04-13 — its mc-image-helper
              # predates Paper's v3 API switch and hit the dead v2 endpoint
              # (410 Gone). java21 is the maintained LTS rolling tag with the
              # current helper (fill.papermc.io/v3); Paper 1.21.4 runs on Java 21.
              tag: java21
              pullPolicy: Always
            env:
              EULA: "TRUE"
              TYPE: "PAPER"
              VERSION: "26.2"
              # 26.2 is a fresh MC release; Paper only ships experimental (ALPHA)
              # builds for it so far, so allow that channel (default is stable).
              PAPER_CHANNEL: "experimental"
              PLUGINS: |
                https://download.geysermc.org/v2/projects/geyser/versions/latest/builds/latest/downloads/spigot
                https://download.geysermc.org/v2/projects/floodgate/versions/latest/builds/latest/downloads/spigot
                https://github.com/ViaVersion/ViaVersion/releases/download/5.10.0/ViaVersion-5.10.0.jar
                https://github.com/EssentialsX/Essentials/releases/download/2.22.0/EssentialsX-2.22.0.jar
                https://github.com/EssentialsX/Essentials/releases/download/2.22.0/EssentialsXChat-2.22.0.jar
    service:
      main:
        type: LoadBalancer
        controller: main
        externalTrafficPolicy: Cluster
        annotations:
          metallb.universe.tf/loadBalancerIPs: "${LOCAL_LB_IP}"
          metallb.universe.tf/allow-shared-ip: external-svc
        ports:
          main-udp:
            port: 25565
            protocol: UDP
          main-tcp:
            port: 25565
            protocol: TCP
          other:
            port: 19132
            protocol: UDP
    persistence:
      main-config:
        existingClaim: minecraft-data
        globalMounts:
          - path: /data
