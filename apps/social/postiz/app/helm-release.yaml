apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: postiz
spec:
  interval: 5m
  chart:
    spec:
      chart: app-template
      version: 5.0.1
      sourceRef:
        kind: HelmRepository
        name: bjw-s-charts
        namespace: flux-system
  values:
    controllers:
      main:
        containers:
          main:
            image:
              repository: ghcr.io/gitroomhq/postiz-app
              tag: latest
            env:
              MAIN_URL: "https://postiz.${PUBLIC_HOSTNAME}"
              FRONTEND_URL: "https://postiz.${PUBLIC_HOSTNAME}"
              NEXT_PUBLIC_BACKEND_URL: "https://postiz.${PUBLIC_HOSTNAME}/api"
              BACKEND_INTERNAL_URL: "http://localhost:3000"
              IS_GENERAL: "true"
              DISABLE_REGISTRATION: "false"
              STORAGE_PROVIDER: "local"
              UPLOAD_DIRECTORY: "/uploads"
              NEXT_PUBLIC_UPLOAD_DIRECTORY: "/uploads"
            envFrom:
              - secretRef:
                  name: postiz-secrets
    service:
      main:
        controller: main
        ports:
          http:
            port: 5000
    persistence:
      uploads:
        existingClaim: postiz-uploads
        globalMounts:
          - path: /uploads
      config:
        type: emptyDir
        globalMounts:
          - path: /config
