---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: metube
spec:
  interval: 5m
  chart:
    spec:
      chart: app-template
      version: 4.1.2
      sourceRef:
        kind: HelmRepository
        name: bjw-s-charts
        namespace: flux-system
  values:
    defaultPodOptions:
      securityContext:
        fsGroup: 3001
        fsGroupChangePolicy: OnRootMismatch
    controllers:
      main:
        containers:
          main:
            image:
              repository: ghcr.io/alexta69/metube
              tag: "2026.03.21"
            securityContext:
              runAsUser: 568
            env:
              TZ: "${TIMEZONE}"
              STATE_DIR: "/config"
              CLEAR_COMPLETED_AFTER: "60"
    service:
      main:
        controller: main
        ports:
          http:
            port: 8081
    persistence:
      main-config:
        existingClaim: metube-config
        globalMounts:
          - path: /config
      downloads:
        existingClaim: scratch-nfs
        globalMounts:
          - path: /downloads
            subPath: MeTube
