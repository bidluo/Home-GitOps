---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/postgresql.cnpg.io/cluster_v1.json
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: immich-pg
spec:
  instances: 2
  primaryUpdateStrategy: unsupervised
  # pgvecto.rs image + preloaded `vectors` — required by Immich (matches the old data-cluster).
  imageName: ghcr.io/tensorchord/cloudnative-pgvecto.rs:14-v0.3.0
  storage:
    size: 10Gi
    storageClass: longhorn-xfs
  # HA: 2 instances (primary + hot standby) forced onto different nodes via pod
  # anti-affinity, so a single node loss/reboot leaves the DB serving. Dropped the
  # control-plane pin — the standby lands on koko-bravo (larger, near-empty node).
  # Physical (streaming) replication carries the pgvecto.rs data + extensions.
  affinity:
    enablePodAntiAffinity: true
    topologyKey: kubernetes.io/hostname
    podAntiAffinityType: required
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      memory: 1536Mi
  postgresql:
    shared_preload_libraries:
      - "vectors"
      - "cube"
      - "earthdistance"
  monitoring:
    enablePodMonitor: true
  bootstrap:
    initdb:
      database: immich
      owner: immich
      secret:
        name: immich-pg-owner
  # Second database (immich-secondary / "lotus") lives in the same pgvecto cluster.
  managed:
    roles:
      - name: limmich
        ensure: present
        login: true
        passwordSecret:
          name: limmich-pg-owner
  backup:
    retentionPolicy: 30d
    barmanObjectStore:
      destinationPath: s3://${B2_CNPG_BUCKET}/
      endpointURL: https://s3.${B2_REGION}.backblazeb2.com
      serverName: immich-pg
      wal:
        compression: bzip2
        maxParallel: 8
      s3Credentials:
        accessKeyId:
          name: cnpg-secrets
          key: S3_ACCESS_KEY
        secretAccessKey:
          name: cnpg-secrets
          key: S3_SECRET_KEY
