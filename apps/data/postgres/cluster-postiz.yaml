---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: postgres-postiz
  namespace: flux-system
spec:
  path: ./apps/data/postgres/cluster-postiz
  targetNamespace: data
  interval: 10m
  prune: true
  dependsOn:
    - name: cnpg-app
  sourceRef:
    kind: GitRepository
    name: flux-system
  healthChecks:
    - apiVersion: postgresql.cnpg.io/v1
      kind: Cluster
      name: postiz-pg
      namespace: data
