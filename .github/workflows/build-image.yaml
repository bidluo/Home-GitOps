name: Build and Push Docker Image

on:
  push:
    branches: [main, master]
    paths:
      - 'images/**'
  workflow_dispatch:
    inputs:
      variant:
        description: "Image to build (e.g., paperclip, ubuntu-nfs). Leave empty to build all changed."
        required: false
        default: ""

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      images: ${{ steps.set-matrix.outputs.images }}
    steps:
      - name: Check out code
        uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Determine which images to build
        id: set-matrix
        run: |
          if [ -n "${{ github.event.inputs.variant }}" ]; then
            # Manual dispatch for a specific image
            echo 'images=["${{ github.event.inputs.variant }}"]' >> $GITHUB_OUTPUT
          elif [ "${{ github.event_name }}" = "push" ]; then
            # Detect changed images from the commit
            changed=$(git diff --name-only HEAD~1 HEAD -- images/ \
              | cut -d'/' -f2 | sort -u | jq -R -s -c 'split("\n") | map(select(length > 0))')
            echo "images=${changed}" >> $GITHUB_OUTPUT
          else
            # Fallback: build all
            changed=$(ls -d images/*/ | xargs -I{} basename {} | jq -R -s -c 'split("\n") | map(select(length > 0))')
            echo "images=${changed}" >> $GITHUB_OUTPUT
          fi

  build:
    needs: detect
    if: needs.detect.outputs.images != '[]' && needs.detect.outputs.images != ''
    runs-on: ubuntu-latest
    strategy:
      matrix:
        image: ${{ fromJson(needs.detect.outputs.images) }}
    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Read version
        id: version
        run: |
          version_file="images/${{ matrix.image }}/VERSION"
          if [ -f "$version_file" ]; then
            echo "tag=$(cat $version_file | tr -d '[:space:]')" >> $GITHUB_OUTPUT
          else
            echo "tag=latest" >> $GITHUB_OUTPUT
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        run: echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.repository_owner }} --password-stdin

      - name: Build and push
        run: |
          image="ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}"
          tag="${{ steps.version.outputs.tag }}"

          docker build \
            --build-arg TAG="$tag" \
            -t "${image}:${tag}" \
            -t "${image}:latest" \
            "images/${{ matrix.image }}"

          docker push "${image}:${tag}"
          docker push "${image}:latest"

          echo "Pushed ${image}:${tag} and ${image}:latest"
