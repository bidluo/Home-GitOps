---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: immich-lotus
spec:
  interval: 5m
  chart:
    spec:
      chart: app-template
      version: 5.0.1
      sourceRef:
        kind: HelmRepository
        name: bjw-s-charts
        namespace: flux-system
  values:
    defaultPodOptions:
      securityContext:
        runAsUser: 3001
        runAsGroup: 3001
        fsGroup: 3001
        fsGroupChangePolicy: OnRootMismatch
    controllers:
      # Intentionally OFF (same as primary immich): scaled to 0 since the DB
      # migration, never brought back. replicas:0 must live in git or a reconcile
      # re-renders it to the chart default of 1.
      main:
        replicas: 0
        containers:
          main:
            nameOverride: immich-server-lotus
            image:
              repository: ghcr.io/immich-app/immich-server
              tag: v3.0.2
            envFrom:
              - secretRef:
                  name: immich-secrets-lotus
      machine-learning:
        replicas: 0
        containers:
          main:
            image:
              repository: ghcr.io/immich-app/immich-machine-learning
              tag: v3.0.2
            envFrom:
              - secretRef:
                  name: immich-secrets-lotus
    service:
      main:
        controller: main
        ports:
          http:
            port: 2283
      machine-learning:
        enabled: true
        controller: machine-learning 
        ports:
          http:
            enabled: true
            port: 3003
    persistence:
      photos:
        existingClaim: lotus-nfs
        globalMounts:
          - path: /photos
            readOnly: true
      storage:
        existingClaim: scratch-nfs
        globalMounts:
          - path: /usr/src/app/upload
            subPath: Lotus
      config:
        enabled: true
        type: secret
        name: immich-config-lotus
        globalMounts:
          - path: /config.json
            subPath: config