---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: slink
spec:
  interval: 5m
  chart:
    spec:
      chart: app-template
      version: 3.6.0
      sourceRef:
        kind: HelmRepository
        name: bjw-s-charts
        namespace: flux-system
  values:
    controllers:
      main:
        containers:
          main:
            image:
              repository: anirdev/slink
              tag: v1.4.5
            securityContext:
              runAsUser: 0
            env:
              ORIGIN: "share.${PUBLIC_HOSTNAME}"
    service:
      main:
        controller: main
        ports:
          http:
            port: 3000
    persistence:
      main-config:
        existingClaim: slink-config
        globalMounts:
          - path: /app/var/data
      downloads:
        existingClaim: slink-data
        globalMounts:
          - path: /app/slink/images
    ingress:
      main:
        enabled: true
        hosts:
          - host: "share.${PUBLIC_HOSTNAME}"
            paths:
              - path: /
                pathType: Prefix
                service:
                  name: slink
                  port: 3000
