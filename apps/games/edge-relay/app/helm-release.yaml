---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: edge-relay
spec:
  interval: 5m
  chart:
    spec:
      chart: app-template
      version: 5.0.1
      sourceRef:
        kind: HelmRepository
        name: bjw-s-charts
        namespace: flux-system
  values:
    controllers:
      main:
        containers:
          main:
            image:
              repository: alpine
              tag: "3.21"
            command:
              - /bin/sh
              - /config/relay.sh
            env:
              RELAY_TARGET: "${LOCAL_LB_IP}"
              RELAY_PORT_START: "${GAME_PORT_START:=20000}"
              RELAY_PORT_END: "${GAME_PORT_END:=20100}"
            securityContext:
              privileged: true
              capabilities:
                add:
                  - NET_ADMIN
    defaultPodOptions:
      hostNetwork: true
      # Edge node in a remote region: resolve via the node's own resolvers, not
      # CoreDNS over the flannel WAN overlay (which is flaky and breaks `apk add`
      # at startup). The relay only DNATs to an IP, so it needs no cluster DNS.
      dnsPolicy: Default
      securityContext:
        runAsUser: 0
      nodeSelector:
        homelab.bidluo.io/game-ingress: "true"
      tolerations:
        - key: game-ingress
          operator: Exists
          effect: NoSchedule
    service:
      main:
        enabled: false
    persistence:
      script:
        type: configMap
        name: edge-relay-script
        defaultMode: 0755
        globalMounts:
          - path: /config/relay.sh
            subPath: relay.sh
            readOnly: true
