---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: adguard
spec:
  interval: 5m
  chart:
    spec:
      chart: app-template
      version: 5.0.1
      sourceRef:
        kind: HelmRepository
        name: bjw-s-charts
        namespace: flux-system
  values:
    controllers:
      main:
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          init-config:
            image:
              repository: docker.io/library/busybox
              tag: "1.37"
            command:
              - sh
              - -c
              - cp -f /config-src/AdGuardHome.yaml /opt/adguardhome/conf/AdGuardHome.yaml
        containers:
          main:
            image:
              repository: adguard/adguardhome
              tag: v0.107.77
            resources:
              limits: {}
              requests: {}
    defaultPodOptions:
      nodeSelector:
        node-role.kubernetes.io/master: "true"
    service:
      main:
        type: LoadBalancer 
        controller: main
        externalTrafficPolicy: Cluster 
        annotations:
            metallb.universe.tf/loadBalancerIPs: "${LOCAL_LB_IP}"
            metallb.universe.tf/allow-shared-ip: external-svc
        ports:
          dns-tcp:
            port: 53
            protocol: TCP
          dns-udp:
            port: 53
            protocol: UDP
          http:
            port: 3000
            protocol: TCP
    persistence:
      config-src:
        type: secret
        name: adguard-config-file
        globalMounts:
          - path: /config-src
            readOnly: true
      main-config:
        existingClaim: adguard-config
        globalMounts:
          - path: /opt/adguardhome/conf
      data:
        existingClaim: adguard-data
        globalMounts:
          - path: /opt/adguardhome/work
