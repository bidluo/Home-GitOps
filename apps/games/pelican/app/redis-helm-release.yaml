---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: pelican-redis
spec:
  interval: 5m
  chart:
    spec:
      chart: app-template
      version: 5.0.1
      sourceRef:
        kind: HelmRepository
        name: bjw-s-charts
        namespace: flux-system
  values:
    defaultPodOptions:
      nodeSelector:
        node-role.kubernetes.io/master: "true"
    controllers:
      main:
        containers:
          main:
            image:
              repository: redis
              tag: 7-alpine
            args:
              - redis-server
              - --save
              - ""
              - --appendonly
              - "no"
    service:
      main:
        controller: main
        ports:
          redis:
            port: 6379
            protocol: TCP
