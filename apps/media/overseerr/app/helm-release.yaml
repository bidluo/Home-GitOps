---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: overseerr
spec:
  interval: 5m
  chart:
    spec:
      chart: app-template
      version: 4.6.2
      sourceRef:
        kind: HelmRepository
        name: bjw-s-charts
        namespace: flux-system
  values:
    controllers:
      main:
        initContainers:
          chown:
            image:
              repository: alpine
              tag: latest
            command:
              - /bin/sh
              - -c
              - chown -R 1000:1000 /app/config
            securityContext:
              runAsUser: 0
        containers:
          main:
            image:
              repository: ghcr.io/seerr-team/seerr
              tag: v3.1.0
    service:
      main:
        controller: main
        ports:
          http:
            port: 5055
    persistence:
      main-config:
        existingClaim: overseerr-config
        globalMounts:
          - path: /app/config