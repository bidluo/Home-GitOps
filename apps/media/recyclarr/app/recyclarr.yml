# Recyclarr config — syncs TRaSH Guides custom formats + quality profiles/definitions
# into Sonarr & Radarr. API keys come from env (recyclarr-secrets). Templates are
# recyclarr's built-in TRaSH includes; tweak the include list / profiles to taste.
sonarr:
  main:
    base_url: http://sonarr.media.svc.cluster.local:8989
    api_key: !env_var SONARR_API_KEY
    delete_old_custom_formats: true
    replace_existing_custom_formats: true
    include:
      # v8 high-level template (id) — bundles quality definition + the WEB-1080p
      # profile + its custom formats. `recyclarr list <thing> sonarr` shows options.
      - template: web-1080p-v4

radarr:
  main:
    base_url: http://radarr.media.svc.cluster.local:7878
    api_key: !env_var RADARR_API_KEY
    delete_old_custom_formats: true
    replace_existing_custom_formats: true
    include:
      # v8 high-level template (id) — bundles quality definition + the HD Bluray+WEB
      # profile + its custom formats.
      - template: hd-bluray-web
