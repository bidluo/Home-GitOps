---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: openclaw-app
  namespace: flux-system
spec:
  path: ./apps/openclaw/openclaw/app
  targetNamespace: openclaw
  interval: 10m
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  healthChecks:
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: openclaw
      namespace: openclaw
