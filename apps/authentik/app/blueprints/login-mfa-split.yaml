# The `passwordless` flow started with a username-identification stage, so the
# "Use a passkey" button just re-showed the login page. A passwordless flow must
# begin with the WebAuthn assertion. Remove the identification binding so the
# flow is: authenticator-validate (webauthn, passwordless) -> user-login. The
# authenticator-validate stage, reached with no identified user, performs the
# passwordless passkey assertion (which identifies + authenticates).
#
# Only touches the passwordless flow's own binding — the password login path is a
# separate flow and is unaffected.
version: 1
metadata:
  name: custom - login - passwordless flow fix
entries:
  - model: authentik_flows.flowstagebinding
    state: absent
    identifiers:
      target: !Find [authentik_flows.flow, [slug, passwordless]]
      order: 10
      stage: !Find [authentik_stages_identification.identificationstage, [name, default-authentication-identification]]
