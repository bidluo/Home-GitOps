---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: openclaw
spec:
  interval: 5m
  chart:
    spec:
      chart: openclaw
      version: 1.5.3
      sourceRef:
        kind: HelmRepository
        name: openclaw-charts
        namespace: flux-system
  values:
    app-template:
      controllers:
        main:
          containers:
            main:
              envFrom:
                - secretRef:
                    name: openclaw-secrets
      service:
        main:
          controller: main
          annotations:
            tailscale.com/expose: "true"
            tailscale.com/hostname: "openclaw"
          ports:
            http:
              port: 18789
      persistence:
        data:
          enabled: true
          type: persistentVolumeClaim
          accessMode: ReadWriteOnce
          size: 5Gi
          storageClass: longhorn-backup
