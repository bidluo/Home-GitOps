---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: recyclarr
spec:
  interval: 5m
  chart:
    spec:
      chart: app-template
      version: 5.0.1
      sourceRef:
        kind: HelmRepository
        name: bjw-s-charts
        namespace: flux-system
  values:
    controllers:
      main:
        # Runs `recyclarr sync` daily (no web UI). Clones the TRaSH repo into the
        # emptyDir /config each run and pushes the config to Sonarr/Radarr.
        type: cronjob
        cronjob:
          schedule: "0 4 * * *"
          concurrencyPolicy: Forbid
          successfulJobsHistory: 1
          failedJobsHistory: 1
        containers:
          main:
            image:
              repository: ghcr.io/recyclarr/recyclarr
              tag: 8.6.0
            args:
              - sync
            envFrom:
              - secretRef:
                  name: recyclarr-secrets
            resources:
              requests:
                cpu: 25m
                memory: 64Mi
              limits:
                memory: 256Mi
    persistence:
      config:
        type: emptyDir
        globalMounts:
          - path: /config
      recyclarr-yml:
        type: configMap
        name: recyclarr-config
        globalMounts:
          - path: /config/recyclarr.yml
            subPath: recyclarr.yml
            readOnly: true
