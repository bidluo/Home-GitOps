---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: immich
spec:
  interval: 5m
  chart:
    spec:
      chart: app-template
      version: 5.0.1
      sourceRef:
        kind: HelmRepository
        name: bjw-s-charts
        namespace: flux-system
  values:
    defaultPodOptions:
      securityContext:
        runAsUser: 3001
        runAsGroup: 3001
        fsGroup: 3001
        fsGroupChangePolicy: OnRootMismatch
    controllers:
      # Intentionally OFF: immich has been scaled to 0 since the data-cluster ->
      # immich-pg migration and was never brought back. (v2.7.5 also can't
      # CREATE EXTENSION vector against the pgvecto.rs immich-pg as the non-superuser
      # immich role; immich v3 drops pgvecto.rs for pgvector entirely — a separate
      # migration.) replicas:0 must live in git or a reconcile re-renders it to 1.
      main:
        replicas: 0
        containers:
          main:
            nameOverride: immich-server
            image:
              repository: ghcr.io/immich-app/immich-server
              tag: v3.0.2
            envFrom:
              - secretRef:
                  name: immich-secrets
      machine-learning:
        replicas: 0
        containers:
          main:
            image:
              repository: ghcr.io/immich-app/immich-machine-learning
              tag: v3.0.2
            envFrom:
              - secretRef:
                  name: immich-secrets
    service:
      main:
        controller: main
        ports:
          http:
            port: 2283
      machine-learning:
        enabled: true
        controller: machine-learning 
        ports:
          http:
            enabled: true
            port: 3003
    persistence:
      photos:
        existingClaim: photos-nfs
        globalMounts:
          - path: /photos
            readOnly: true
      storage:
        existingClaim: scratch-nfs
        globalMounts:
          - path: /usr/src/app/upload
            subPath: Immich
      config:
        enabled: true
        type: secret
        name: immich-config
        globalMounts:
          - path: /config.json
            subPath: config