---
# Shared Barman Cloud Plugin object store — the supported replacement for the
# per-cluster in-tree spec.backup.barmanObjectStore (deprecated, removed in CNPG
# 1.30). One store for the B2 bucket + creds + 30d retention; each cluster keeps
# its OWN backup stream by setting serverName in its spec.plugins parameters
# (NOT here), so existing streams stay continuous and recoverable.
apiVersion: barmancloud.cnpg.io/v1
kind: ObjectStore
metadata:
  name: cnpg-b2
spec:
  retentionPolicy: "30d"
  configuration:
    destinationPath: s3://${B2_CNPG_BUCKET}/
    endpointURL: https://s3.${B2_REGION}.backblazeb2.com
    s3Credentials:
      accessKeyId:
        name: cnpg-secrets
        key: S3_ACCESS_KEY
      secretAccessKey:
        name: cnpg-secrets
        key: S3_SECRET_KEY
    wal:
      compression: bzip2
      maxParallel: 8
