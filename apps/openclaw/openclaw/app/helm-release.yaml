---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: openclaw
spec:
  interval: 5m
  chart:
    spec:
      chart: openclaw
      version: 1.5.3
      sourceRef:
        kind: HelmRepository
        name: openclaw-charts
        namespace: flux-system
  values:
    app-template:
      controllers:
        main:
          containers:
            main:
              envFrom:
                - secretRef:
                    name: openclaw-secrets
      service:
        main:
          controller: main
          annotations:
            tailscale.com/expose: "true"
            tailscale.com/hostname: "openclaw"
          ports:
            http:
              port: 18789
      configMaps:
        config:
          data:
            openclaw.json: |
              {
                "gateway": {
                  "port": 18789,
                  "mode": "local",
                  "controlUi": {
                    "allowedOrigins": [
                      "https://openclaw.${PUBLIC_HOSTNAME}"
                    ]
                  }
                },
                "browser": {
                  "enabled": true,
                  "defaultProfile": "default",
                  "profiles": {
                    "default": {
                      "cdpUrl": "http://localhost:9222",
                      "color": "#4285F4"
                    }
                  }
                },
                "agents": {
                  "defaults": {
                    "workspace": "/home/node/.openclaw/workspace",
                    "model": {
                      "primary": "anthropic/claude-opus-4-6"
                    },
                    "timeoutSeconds": 600,
                    "maxConcurrent": 1
                  },
                  "list": [
                    {
                      "id": "main",
                      "default": true,
                      "identity": {
                        "name": "OpenClaw",
                        "emoji": "🦞"
                      }
                    }
                  ]
                },
                "session": {
                  "scope": "per-sender",
                  "store": "/home/node/.openclaw/sessions",
                  "reset": {
                    "mode": "idle",
                    "idleMinutes": 60
                  }
                },
                "tools": {
                  "profile": "full",
                  "web": {
                    "search": { "enabled": false },
                    "fetch": { "enabled": true }
                  }
                }
              }
      persistence:
        data:
          enabled: true
          type: persistentVolumeClaim
          accessMode: ReadWriteOnce
          size: 5Gi
          storageClass: longhorn-backup
