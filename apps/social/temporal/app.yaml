apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: temporal
  namespace: flux-system
spec:
  path: ./apps/social/temporal/app
  targetNamespace: social
  interval: 10m
  prune: true
  dependsOn:
    - name: postgres-temporal
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  healthChecks:
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: temporal
      namespace: social
