apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: postiz
  namespace: flux-system
spec:
  path: ./apps/social/postiz/app
  targetNamespace: social
  interval: 10m
  prune: true
  dependsOn:
    - name: longhorn-app
    - name: redis-postiz-app
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  healthChecks:
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: postiz
      namespace: social
