---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/postgresql.cnpg.io/cluster_v1.json
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: paperless-pg
spec:
  instances: 2
  primaryUpdateStrategy: unsupervised
  # No imageName -> operator default (current PostgreSQL major). Plain PG, no extensions.
  storage:
    size: 5Gi
    storageClass: longhorn-xfs
  # HA: 2 instances (primary + hot standby) forced onto different nodes via pod
  # anti-affinity, so a single node loss/reboot leaves the DB serving. Dropped the
  # control-plane pin — the standby lands on koko-bravo (larger, near-empty node)
  # instead of stacking every DB on the smaller control-plane node.
  affinity:
    enablePodAntiAffinity: true
    topologyKey: kubernetes.io/hostname
    podAntiAffinityType: required
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      memory: 768Mi
  monitoring:
    enablePodMonitor: true
  bootstrap:
    initdb:
      database: paperless
      owner: paperless
      secret:
        name: paperless-pg-owner
  # Backups via the Barman Cloud Plugin -> shared ObjectStore `cnpg-b2`.
  # serverName preserved (paperless-pg) so this continues the existing B2 stream.
  plugins:
    - name: barman-cloud.cloudnative-pg.io
      isWALArchiver: true
      parameters:
        barmanObjectName: cnpg-b2
        serverName: paperless-pg
