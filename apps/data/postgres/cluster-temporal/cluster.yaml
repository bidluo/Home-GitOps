---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/postgresql.cnpg.io/cluster_v1.json
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: temporal-pg
spec:
  instances: 1
  primaryUpdateStrategy: unsupervised
  # Plain PG. Temporal uses two DBs: `temporal` (initdb) + `temporal_visibility` (Database CR).
  storage:
    size: 5Gi
    storageClass: longhorn-xfs
  affinity:
    nodeSelector:
      node-role.kubernetes.io/control-plane: "true"
  monitoring:
    enablePodMonitor: true
  bootstrap:
    initdb:
      database: temporal
      owner: temporal
      secret:
        name: temporal-pg-owner
  backup:
    retentionPolicy: 30d
    barmanObjectStore:
      destinationPath: s3://${B2_CNPG_BUCKET}/
      endpointURL: https://s3.${B2_REGION}.backblazeb2.com
      serverName: temporal-pg
      wal:
        compression: bzip2
        maxParallel: 8
      s3Credentials:
        accessKeyId:
          name: cnpg-secrets
          key: S3_ACCESS_KEY
        secretAccessKey:
          name: cnpg-secrets
          key: S3_SECRET_KEY
