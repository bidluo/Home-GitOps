---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: home-assistant
spec:
  interval: 5m
  chart:
    spec:
      chart: app-template
      version: 5.0.1
      sourceRef:
        kind: HelmRepository
        name: bjw-s-charts
        namespace: flux-system
  values:
    controllers:
      main:
        containers:
          main:
            image:
              repository: ghcr.io/home-assistant/home-assistant
              tag: 2026.7.0
            resources:
              requests:
                cpu: 100m
                memory: 384Mi
              limits:
                memory: 768Mi
    defaultPodOptions:
      hostNetwork: true
      # Kept pinned (exception to the GPU-only rule): hostNetwork ties HA to a
      # node's IP, and moving it can break LAN device integrations / mDNS.
      nodeSelector:
        node-role.kubernetes.io/control-plane: "true"
    service:
      main:
        controller: main
        ports:
          http:
            enabled: true
            port: 8123
    persistence:
      main-config:
        existingClaim: home-assistant-config
        globalMounts:
          - path: /config-bak
      config-backup:
        existingClaim: home-assistant-config-backup
        globalMounts:
          - path: /config