apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
- helm-release.yaml
- authentik-secrets.sops.yaml
- ingress.yaml
- role.yaml

# Custom blueprints are bundled into a ConfigMap and mounted into the authentik
# pods at /blueprints/custom (see helm-release.yaml global.volumes). The worker
# discovers and applies them. Stable name (no hash suffix) so the static volume
# reference in the HelmRelease values keeps matching; the worker re-reads changed
# files on its own schedule, so no pod restart is needed on content changes.
configMapGenerator:
- name: authentik-blueprints
  files:
  - blueprints/00-pipeline-check.yaml
  - blueprints/actual.yaml
  - blueprints/changedetection.yaml
  - blueprints/goldilocks.yaml
  - blueprints/hoarder.yaml
  - blueprints/immich.yaml
  - blueprints/longhorn.yaml
  - blueprints/metube.yaml
  - blueprints/n8n.yaml
  - blueprints/oauth.yaml
  - blueprints/overseerr.yaml
  - blueprints/photoview.yaml
  - blueprints/radarr.yaml
  - blueprints/sabnzbd.yaml
  - blueprints/sonarr.yaml
  - blueprints/tdarr.yaml
  - blueprints/uptime-kuma.yaml
generatorOptions:
  disableNameSuffixHash: true