---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/postgresql.cnpg.io/cluster_v1.json
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: immich-pg
spec:
  instances: 1
  primaryUpdateStrategy: unsupervised
  # VectorChord image (PG17 + VectorChord 0.4.3). Immich v3 dropped pgvecto.rs for
  # VectorChord (vchord, built on pgvector). shared_preload_libraries must load
  # vchord.so. The immich + limmich roles are SUPERUSERS so immich creates its own
  # extensions (vchord/vector/earthdistance) on first boot — immich's documented
  # easy path; acceptable for this low-value, rebuildable service.
  imageName: ghcr.io/tensorchord/cloudnative-vectorchord:17.5-0.4.3
  storage:
    size: 10Gi
    storageClass: longhorn-xfs
  # Single instance (immich is low-value/rebuildable). Durability = Longhorn
  # replication + B2 backups.
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      memory: 1536Mi
  postgresql:
    shared_preload_libraries:
      - vchord.so
  bootstrap:
    initdb:
      database: immich
      owner: immich
      secret:
        name: immich-pg-owner
  # immich + limmich (immich-lotus) as superusers so each immich instance can
  # CREATE EXTENSION vchord/earthdistance itself. limmich also backs the second DB.
  managed:
    roles:
      - name: immich
        ensure: present
        superuser: true
        login: true
        passwordSecret:
          name: immich-pg-owner
      - name: limmich
        ensure: present
        superuser: true
        login: true
        passwordSecret:
          name: limmich-pg-owner
  # Backups via the Barman Cloud Plugin -> shared ObjectStore `cnpg-b2`.
  # NEW serverName (fresh cluster on a new PG major/system-id; the old immich-pg
  # pgvecto.rs backup stream is orphaned and ages out via retention).
  plugins:
    - name: barman-cloud.cloudnative-pg.io
      isWALArchiver: true
      parameters:
        barmanObjectName: cnpg-b2
        serverName: immich-pg-vchord
