apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: authentik 
spec:
  interval: 5m
  chart:
    spec:
      chart: authentik
      version: 2026.5.6
      sourceRef:
        kind: HelmRepository
        name: authentik-charts
        namespace: flux-system
  values:
    global:
      envFrom:
        - secretRef:
            name: authentik-secrets
      # Mount repo-managed blueprints into all authentik pods. The worker
      # discovers /blueprints/custom and applies them idempotently.
      volumes:
        - name: blueprints-custom
          configMap:
            name: authentik-blueprints
      volumeMounts:
        - name: blueprints-custom
          mountPath: /blueprints/custom
    authentik:
      error_reporting_enabled: true
      email:
        host: smtp.sendgrid.net
        username: apikey
        use_tls: true
    server:
      resources:
        requests:
          cpu: 100m
          memory: 512Mi
        limits:
          memory: 1Gi
      volumes:
        - name: shm
          emptyDir:
            medium: Memory
            sizeLimit: 512Mi
      volumeMounts:
        - name: shm
          mountPath: /dev/shm
    worker:
      resources:
        requests:
          cpu: 100m
          memory: 512Mi
        limits:
          memory: 1Gi
    postgresql:
      enabled: false
    redis:
      enabled: true