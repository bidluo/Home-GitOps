apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: paperless
  namespace: flux-system
spec:
  path: ./apps/home/paperless/app
  targetNamespace: home
  interval: 10m
  prune: true
  dependsOn:
    - name: longhorn-app
    - name: redis-paperless-app
    - name: postgres-paperless
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  healthChecks:
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: paperless
      namespace: home
