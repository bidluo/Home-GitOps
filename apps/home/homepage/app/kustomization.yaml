apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
- helm-release.yaml
- rbac.yaml
configMapGenerator:
- name: homepage-config
  files:
  - config/settings.yaml
  - config/services.yaml
  - config/widgets.yaml
  - config/bookmarks.yaml
  - config/kubernetes.yaml
  - config/docker.yaml
generatorOptions:
  disableNameSuffixHash: true
