---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: paperclip-app
  namespace: flux-system
spec:
  path: ./apps/paperclip/paperclip/app
  targetNamespace: paperclip
  interval: 10m
  prune: true
  dependsOn:
    - name: paperclip-postgres-app
  sourceRef:
    kind: GitRepository
    name: flux-system
  healthChecks:
    - apiVersion: helm.toolkit.fluxcd.io/v2beta1
      kind: HelmRelease
      name: paperclip
      namespace: paperclip
