---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: promtail
spec:
  interval: 5m
  chart:
    spec:
      chart: promtail
      version: 6.17.1
      sourceRef:
        kind: HelmRepository
        name: grafana-charts
        namespace: flux-system
      interval: 5m
  values:
    serviceMonitor:
      enabled: true
    tolerations:
      - effect: NoSchedule
        operator: Exists
      - effect: NoExecute
        operator: Exists
    # Noise trimming. longhorn + loki-self + vpa were ~77% of ingestion at
    # ~2.85GB/day and filled the 20Gi volume. Drop their info/debug chatter,
    # keep warnings/errors. Each drop is scoped to its namespace/app so nothing
    # else is affected.
    config:
      snippets:
        pipelineStages:
          - cri: {}
          # longhorn (logrus/logfmt: level=info)
          - match:
              selector: '{namespace="longhorn-system"}'
              stages:
                - drop:
                    expression: '.*level=(debug|info|trace).*'
                    drop_counter_reason: noise_longhorn
          # loki logging into itself (logfmt: level=info)
          - match:
              selector: '{namespace="monitoring", app="loki"}'
              stages:
                - drop:
                    expression: '.*level=(debug|info).*'
                    drop_counter_reason: noise_loki_self
          # goldilocks VPA (klog: I=info, W=warn, E=error) — drop info lines
          - match:
              selector: '{namespace="monitoring", app="vpa"}'
              stages:
                - drop:
                    expression: '^I\d{4} .*'
                    drop_counter_reason: noise_vpa