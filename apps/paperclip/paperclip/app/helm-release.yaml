---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: paperclip
spec:
  interval: 5m
  chart:
    spec:
      chart: app-template
      version: 4.1.2
      sourceRef:
        kind: HelmRepository
        name: bjw-s-charts
        namespace: flux-system
  values:
    controllers:
      main:
        containers:
          main:
            image:
              repository: ghcr.io/bidluo/paperclip
              tag: "0.1.0"
            env:
              HOST: "0.0.0.0"
              PORT: "3100"
              SERVE_UI: "true"
              PAPERCLIP_HOME: "/paperclip"
              PAPERCLIP_DEPLOYMENT_MODE: "authenticated"
              PAPERCLIP_DEPLOYMENT_EXPOSURE: "private"
              DATABASE_URL:
                valueFrom:
                  secretKeyRef:
                    name: paperclip-pg-app
                    key: uri
            envFrom:
              - secretRef:
                  name: paperclip-secrets
    service:
      main:
        controller: main
        annotations:
          tailscale.com/expose: "true"
          tailscale.com/hostname: "paperclip"
        ports:
          http:
            port: 3100
    persistence:
      data:
        existingClaim: paperclip-data
        globalMounts:
          - path: /paperclip
