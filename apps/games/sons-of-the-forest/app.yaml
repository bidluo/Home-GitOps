---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: sons-of-the-forest-app
  namespace: flux-system
spec:
  path: ./apps/games/sons-of-the-forest/app
  targetNamespace: games
  interval: 10m
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  healthChecks:
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: sons-of-the-forest
      namespace: games
