---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/postgresql.cnpg.io/cluster_v1.json
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: paperless-pg
spec:
  instances: 2
  primaryUpdateStrategy: unsupervised
  # No imageName -> operator default (current PostgreSQL major). Plain PG, no extensions.
  storage:
    size: 5Gi
    storageClass: longhorn-xfs
  # HA: 2 instances (primary + hot standby) forced onto different nodes via pod
  # anti-affinity, so a single node loss/reboot leaves the DB serving. Dropped the
  # control-plane pin — the standby lands on koko-bravo (larger, near-empty node)
  # instead of stacking every DB on the smaller control-plane node.
  affinity:
    enablePodAntiAffinity: true
    topologyKey: kubernetes.io/hostname
    podAntiAffinityType: required
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      memory: 768Mi
  monitoring:
    enablePodMonitor: true
  bootstrap:
    initdb:
      database: paperless
      owner: paperless
      secret:
        name: paperless-pg-owner
  backup:
    retentionPolicy: 30d
    barmanObjectStore:
      destinationPath: s3://${B2_CNPG_BUCKET}/
      endpointURL: https://s3.${B2_REGION}.backblazeb2.com
      serverName: paperless-pg
      wal:
        compression: bzip2
        maxParallel: 8
      s3Credentials:
        accessKeyId:
          name: cnpg-secrets
          key: S3_ACCESS_KEY
        secretAccessKey:
          name: cnpg-secrets
          key: S3_SECRET_KEY
