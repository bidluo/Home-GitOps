---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: paperclip-postgres-app
  namespace: flux-system
spec:
  path: ./apps/paperclip/postgres/app
  targetNamespace: paperclip
  interval: 10m
  prune: true
  dependsOn:
    - name: cnpg-app
  sourceRef:
    kind: GitRepository
    name: flux-system
