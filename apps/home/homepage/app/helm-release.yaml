apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: homepage
spec:
  interval: 5m
  chart:
    spec:
      chart: app-template
      version: 5.0.1
      sourceRef:
        kind: HelmRepository
        name: bjw-s-charts
        namespace: flux-system
  values:
    # app-template v5 manages service accounts via this top-level map (the old
    # defaultPodOptions.serviceAccountName isn't a valid field). Single entry ->
    # SA named after the release (`homepage`); the main controller auto-uses it.
    # The ClusterRole/Binding for it live in rbac.yaml.
    serviceAccount:
      homepage: {}
    controllers:
      main:
        containers:
          main:
            image:
              repository: ghcr.io/gethomepage/homepage
              tag: v1.13.2
            env:
              HOMEPAGE_ALLOWED_HOSTS: "dash.${PUBLIC_HOSTNAME}"
    service:
      main:
        controller: main
        ports:
          http:
            port: 3000
    persistence:
      config:
        type: configMap
        name: homepage-config
        globalMounts:
          - path: /app/config
      logs:
        type: emptyDir
        globalMounts:
          - path: /app/config/logs
