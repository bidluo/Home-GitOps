---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kube-prometheus-stack
spec:
  interval: 5m
  chart:
    spec:
      chart: kube-prometheus-stack
      version: 87.15.1
      sourceRef:
        kind: HelmRepository
        name: prometheus-charts
        namespace: flux-system
      interval: 5m
  values:
    defaultRules:
      # These two stock rules are re-added (with a Longhorn engine-image exclusion)
      # in prometheusrule-daemonset-overrides.yaml. Longhorn's `engine-image-*`
      # daemonsets report desired=0/misscheduled=N to kube-state-metrics by design,
      # which trips both alerts as false positives even though the engine is healthy.
      disabled:
        KubeDaemonSetMisScheduled: true
        KubeDaemonSetRolloutStuck: true
    prometheus-node-exporter:
      tolerations:
        - effect: NoSchedule
          operator: Exists
        - effect: NoExecute
          operator: Exists
    prometheusOperator:
      createCustomResource: true 
    kubeControllerManager:
      enabled: false
    kubeScheduler:
      enabled: false
    kubeEtcd:
      enabled: false
    kubeProxy:
      enabled: false
    alertmanager:
      config:
        global:
          resolve_timeout: 5m
        receivers:
          - name: "null"
          - name: discord
            discord_configs:
              - webhook_url: ${MONITORING_DISCORD_WEBHOOK}
                title: '[{{ .Status | toUpper }}{{ if eq .Status "firing" }}:{{ .Alerts.Firing |
                  len }}{{ end }}] {{ if ne .CommonAnnotations.summary ""}}{{
                  .CommonAnnotations.summary }} {{ else if ne
                  .CommonAnnotations.message ""}}{{ .CommonAnnotations.message
                  }} {{ else if ne .CommonAnnotations.description ""}}{{
                  .CommonAnnotations.description }} {{ else }}{{
                  .CommonLabels.alertname }}{{ end }}'
                message: >-
                  {{ range .Alerts -}}
                    **Alert:** {{ .Annotations.title }}{{ if .Labels.severity }} `{{ .Labels.severity }}`{{ end }}
                  {{ if ne .Annotations.summary ""}}**Summary:** {{ .Annotations.summary }} {{ else if ne .Annotations.message ""}}**Message:** {{ .Annotations.message }} {{ else if ne .Annotations.description ""}}**Description:** {{ .Annotations.description }}{{ end }}
                    **Details:**
                    {{ range .Labels.SortedPairs }} • {{ .Name }}: `{{ .Value }}`
                    {{ end }}
                  {{ end }}
        route:
          group_by:
            - alertname
            - job
          group_wait: 30s
          group_interval: 5m
          repeat_interval: 6h
          receiver: discord
          routes:
            - receiver: "null"
              matchers:
                - severity =~ "none"
            - receiver: "null"
              matchers:
                - job_name =~ "cloudflare.*"
            - receiver: discord
    grafana:
      enabled: true
      resources:
        requests:
          cpu: 50m
          memory: 384Mi
        limits:
          memory: 768Mi
      envFromSecret: grafana-secrets
      dashboardProviders:
        dashboardproviders.yaml:
          apiVersion: 1
          providers:
            - name: default
              orgId: 1
              folder: ""
              type: file
              disableDeletion: false
              editable: true
              options:
                path: /var/lib/grafana/dashboards/default
      plugins:
        - grafana-piechart-panel
      dashboards:
        default:
          flux-cluster:
            url: https://raw.githubusercontent.com/fluxcd/flux2/main/manifests/monitoring/monitoring-config/dashboards/cluster.json
            datasource: Prometheus
          flux-control-plane:
            url: https://raw.githubusercontent.com/fluxcd/flux2/main/manifests/monitoring/monitoring-config/dashboards/control-plane.json
            datasource: Prometheus
          cert-manager:
            gnetId: 11001
            revision: 1
            datasource: Prometheus
          redis:
            gnetId: 11835
            revision: 1
            datasource: Prometheus
          postgresql:
            gnetId: 9628
            revision: 7
            datasource: Prometheus
          traefik:
            gnetId: 12250
            revision: 1
            datasource: Prometheus
      sidecar:
        dashboards:
          enabled: true
          searchNamespace: ALL
        datasources:
          enabled: true
          searchNamespace: ALL
      serviceMonitor:
        enabled: true
      ingress:
        enabled: true
        pathType: Prefix
        hosts:
          - grafana.${PUBLIC_HOSTNAME}
    prometheus:
      prometheusSpec:
        resources:
          requests:
            cpu: 200m
            memory: 1536Mi
          limits:
            memory: 2560Mi
        ruleSelectorNilUsesHelmValues: false
        serviceMonitorSelectorNilUsesHelmValues: false
        podMonitorSelectorNilUsesHelmValues: false
        probeSelectorNilUsesHelmValues: false
        retention: 7d
        storageSpec:
          volumeClaimTemplate:
            spec:
              storageClassName: longhorn-xfs
              resources:
                requests:
                  storage: 40Gi
