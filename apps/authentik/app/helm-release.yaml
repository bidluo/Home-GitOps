apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: authentik 
spec:
  interval: 5m
  chart:
    spec:
      chart: authentik
      version: 2025.12.4
      sourceRef:
        kind: HelmRepository
        name: authentik-charts
        namespace: flux-system
  values:
    global:
      envFrom:
        - secretRef:
            name: authentik-secrets
    authentik:
      error_reporting_enabled: true
      email:
        host: smtp.sendgrid.net
        username: apikey
        use_tls: true
    server:
      volumes:
        - name: shm
          emptyDir:
            medium: Memory
            sizeLimit: 512Mi
      volumeMounts:
        - name: shm
          mountPath: /dev/shm
    postgresql:
      enabled: false
    redis:
      enabled: true