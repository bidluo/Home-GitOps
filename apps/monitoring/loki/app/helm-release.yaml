---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: loki
spec:
  interval: 5m
  chart:
    spec:
      chart: loki
      version: 7.0.0
      sourceRef:
        kind: HelmRepository
        name: grafana-charts
        namespace: flux-system
      interval: 5m
  values:
    loki:
      auth_enabled: false
      storage:
        type: filesystem
      commonConfig:
        replication_factor: 1
      limits_config:
        retention_period: 7d
      rulerConfig:
        alertmanager_url: http://kube-prometheus-stack-alertmanager:9093
      schemaConfig:
        configs:
          - from: "2024-04-01"
            store: tsdb
            object_store: filesystem
            schema: v13
            index:
              prefix: index_
              period: 24h
    write:
      replicas: 0
    read:
      replicas: 0
    backend:
      replicas: 0
    deploymentMode: SingleBinary
    singleBinary:
      replicas: 1
      persistence:
        size: 20Gi
        storageClass: longhorn-xfs
    # Right-size the memcached caches. Chart default sizes the pod memory
    # request at allocatedMemory * 1.2 (8192Mi -> ~9.8Gi, 1024Mi -> ~1.2Gi),
    # which is wildly oversized for a single-binary homelab Loki.
    chunksCache:
      allocatedMemory: 512
    resultsCache:
      allocatedMemory: 128
    test:
      enabled: false
    compactor:
      enabled: true
      retention_enabled: true
      retention_delete_delay: 2h
      retention_delete_worker_count: 150
    monitoring:
      selfMonitoring:
        enabled: false
      lokiCanary:
        enabled: false
