---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: recyclarr
  namespace: flux-system
spec:
  path: ./apps/media/recyclarr/app
  targetNamespace: media
  interval: 10m
  prune: true
  dependsOn:
    - name: sonarr
    - name: radarr
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  healthChecks:
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: recyclarr
      namespace: media
