apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: temporal
spec:
  interval: 5m
  chart:
    spec:
      chart: app-template
      version: 5.0.1
      sourceRef:
        kind: HelmRepository
        name: bjw-s-charts
        namespace: flux-system
  values:
    controllers:
      main:
        containers:
          main:
            image:
              repository: temporalio/auto-setup
              tag: "1.29.7"
            env:
              DB: postgres12
              DB_PORT: "5432"
              POSTGRES_SEEDS: temporal-pg-rw.data.svc.cluster.local
              POSTGRES_USER: temporal
              DBNAME: temporal
              VISIBILITY_DBNAME: temporal_visibility
              # DBs are pre-created by CNPG (initdb + Database CR); just set up schema.
              SKIP_DB_CREATE: "true"
              # Elasticsearch advanced visibility (Postgres visibility caps custom Text
              # search attributes at 3; Postiz needs more).
              ENABLE_ES: "true"
              ES_SEEDS: elasticsearch.social.svc.cluster.local
              ES_PORT: "9200"
              ES_VERSION: v7
              ES_SCHEME: http
              DEFAULT_NAMESPACE: default
              DEFAULT_NAMESPACE_RETENTION: "72h"
              # Bind/broadcast on the pod IP so the service reaches it (auto-setup defaults to 127.0.0.1).
              BIND_ON_IP:
                valueFrom:
                  fieldRef:
                    fieldPath: status.podIP
            envFrom:
              - secretRef:
                  name: temporal-secrets
            resources:
              requests:
                cpu: 100m
                memory: 512Mi
              limits:
                memory: 1Gi
    service:
      main:
        controller: main
        ports:
          grpc:
            port: 7233
