apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: open-webui
spec:
  interval: 5m
  chart:
    spec:
      chart: app-template
      version: 5.0.1
      sourceRef:
        kind: HelmRepository
        name: bjw-s-charts
        namespace: flux-system
  values:
    controllers:
      main:
        containers:
          main:
            image:
              repository: ghcr.io/open-webui/open-webui
              tag: 0.6.43
            env:
              # Point the OpenAI-compatible endpoint at cloud APIs for now.
              # Swap ENABLE_OLLAMA_API to "true" and set OLLAMA_BASE_URL once the
              # 5700 XT + Ollama follow-up lands.
              ENABLE_OLLAMA_API: "false"
              WEBUI_URL: "http://open-webui.tools.svc.cluster.local:8080"
            envFrom:
              - secretRef:
                  name: openwebui-secrets
            resources:
              requests:
                cpu: 100m
                memory: 512Mi
              limits:
                memory: 1536Mi
    service:
      main:
        controller: main
        ports:
          http:
            port: 8080
    persistence:
      data:
        existingClaim: open-webui-data
        globalMounts:
          - path: /app/backend/data
