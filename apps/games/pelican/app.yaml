---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: pelican-app
  namespace: flux-system
spec:
  path: ./apps/games/pelican/app
  targetNamespace: games
  interval: 10m
  prune: true
  dependsOn:
    - name: longhorn-app
    - name: cert-manager-issuers
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  healthChecks:
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: pelican-panel
      namespace: games
