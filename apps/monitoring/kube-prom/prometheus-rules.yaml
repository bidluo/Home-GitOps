---
# Homelab-specific alerts on top of the kube-prometheus-stack defaults.
# Prometheus ruleSelector is {} so this is picked up without a special label.
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: homelab-rules
  namespace: monitoring
  labels:
    release: kube-prometheus-stack
spec:
  groups:
    - name: homelab.rules
      rules:
        # Postgres base backups going stale. Backups are @weekly, so >8d = a
        # missed cycle. We key on the Barman Cloud *plugin* metric
        # (barman_cloud_cloudnative_pg_io_*): since the barman-plugin migration
        # the operator no longer feeds the legacy cnpg_collector_* backup
        # timestamp (it froze at the last in-tree backup and falsely fired this
        # alert). Aggregate per-cluster (derive cluster from the pod ordinal) so
        # a stale cluster alerts once, not once per instance. Guard >0 skips
        # anything reporting epoch (no backup yet).
        - alert: CNPGBackupStale
          expr: |
            (time() - max by (namespace, cluster) (
              label_replace(barman_cloud_cloudnative_pg_io_last_available_backup_timestamp, "cluster", "$1", "pod", "(.+)-[0-9]+")
            )) > 8 * 24 * 3600
            and max by (namespace, cluster) (
              label_replace(barman_cloud_cloudnative_pg_io_last_available_backup_timestamp, "cluster", "$1", "pod", "(.+)-[0-9]+")
            ) > 0
          for: 1h
          labels:
            severity: warning
          annotations:
            summary: "CloudNativePG backup is stale"
            description: "Last successful backup is {{ $value | humanizeDuration }} old (cluster {{ $labels.cluster }})."

        # A Deployment that should have replicas but has none available.
        - alert: DeploymentUnavailable
          expr: |
            kube_deployment_status_replicas_available == 0
            and kube_deployment_spec_replicas > 0
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: "Deployment has no available replicas"
            description: "{{ $labels.namespace }}/{{ $labels.deployment }} has 0 available replicas for 15m."

        # Crash-looping containers (caught several this session).
        - alert: PodRestartingFrequently
          expr: increase(kube_pod_container_status_restarts_total[1h]) > 5
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: "Container is restarting frequently"
            description: "{{ $labels.namespace }}/{{ $labels.pod }} ({{ $labels.container }}) restarted {{ $value | printf \"%.0f\" }}x in the last hour."
