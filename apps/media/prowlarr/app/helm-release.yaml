apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: prowlarr
spec:
  interval: 5m
  chart:
    spec:
      chart: app-template
      version: 5.0.1
      sourceRef:
        kind: HelmRepository
        name: bjw-s-charts
        namespace: flux-system
  values:
    defaultPodOptions:
      securityContext:
        fsGroup: 3001
        fsGroupChangePolicy: OnRootMismatch
    controllers:
      main:
        containers:
          main:
            image:
              repository: ghcr.io/home-operations/prowlarr
              tag: 2.5.2
            securityContext:
              runAsUser: 0
            env:
              # Auth required (no anonymous remote access), but the Authentik outpost
              # connects from a cluster-local address so its own login is skipped —
              # Authentik is the real gate. Same as Sonarr/Radarr, done declaratively.
              PROWLARR__AUTH__METHOD: "Forms"
              PROWLARR__AUTH__REQUIRED: "DisabledForLocalAddresses"
            resources:
              requests:
                cpu: 50m
                memory: 192Mi
              limits:
                memory: 512Mi
    service:
      main:
        controller: main
        ports:
          http:
            port: 9696
    persistence:
      main-config:
        existingClaim: prowlarr-config
        globalMounts:
          - path: /config
