apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: postiz
spec:
  interval: 5m
  chart:
    spec:
      chart: app-template
      version: 5.0.1
      sourceRef:
        kind: HelmRepository
        name: bjw-s-charts
        namespace: flux-system
  values:
    controllers:
      main:
        containers:
          main:
            image:
              repository: ghcr.io/gitroomhq/postiz-app
              tag: latest
            env:
              MAIN_URL: "https://postiz.i.${PUBLIC_HOSTNAME}"
              FRONTEND_URL: "https://postiz.i.${PUBLIC_HOSTNAME}"
              NEXT_PUBLIC_BACKEND_URL: "https://postiz.i.${PUBLIC_HOSTNAME}/api"
              BACKEND_INTERNAL_URL: "http://localhost:3000"
              TEMPORAL_ADDRESS: "temporal.social.svc.cluster.local:7233"
              IS_GENERAL: "true"
              DISABLE_REGISTRATION: "false"
              STORAGE_PROVIDER: "local"
              UPLOAD_DIRECTORY: "/uploads"
              NEXT_PUBLIC_UPLOAD_DIRECTORY: "/uploads"
              # SSO login via Authentik (OIDC). Client secret is in postiz-secrets.
              POSTIZ_GENERIC_OAUTH: "true"
              POSTIZ_OAUTH_URL: "https://auth.${PUBLIC_HOSTNAME}/application/o/postiz/"
              POSTIZ_OAUTH_AUTH_URL: "https://auth.${PUBLIC_HOSTNAME}/application/o/authorize/"
              POSTIZ_OAUTH_TOKEN_URL: "https://auth.${PUBLIC_HOSTNAME}/application/o/token/"
              POSTIZ_OAUTH_USERINFO_URL: "https://auth.${PUBLIC_HOSTNAME}/application/o/userinfo/"
              POSTIZ_OAUTH_CLIENT_ID: "5989339b40f4a92ed7c828192bd037c5ae2c6b77"
              NEXT_PUBLIC_POSTIZ_OAUTH_DISPLAY_NAME: "Authentik"
            envFrom:
              - secretRef:
                  name: postiz-secrets
            # postiz creeps toward ~2.3Gi (likely a Node.js leak); the limit caps
            # it (restart on breach) so it can't thrash the node again.
            resources:
              requests:
                cpu: 100m
                memory: 1Gi
              limits:
                memory: 3Gi
    service:
      main:
        controller: main
        ports:
          http:
            port: 5000
    persistence:
      uploads:
        existingClaim: postiz-uploads
        globalMounts:
          - path: /uploads
      config:
        type: emptyDir
        globalMounts:
          - path: /config
