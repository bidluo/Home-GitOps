---
# CNPG-I Barman Cloud Plugin — the supported replacement for the in-tree
# spec.backup.barmanObjectStore, which is deprecated and removed in CNPG 1.30.
# Must live in the operator's namespace (data) so the operator can discover it.
# The chart is self-contained: it creates its own selfsigned Issuer + client/server
# certificates (cert-manager), the ObjectStore CRD, RBAC, the barman-cloud Service
# (:9090) and Deployment, and injects a WAL/backup sidecar into each CNPG pod that
# references it. See ObjectStore `cnpg-b2` and each cluster's spec.plugins.
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: barman-cloud
spec:
  interval: 5m
  chart:
    spec:
      chart: plugin-barman-cloud
      version: 0.7.0
      sourceRef:
        kind: HelmRepository
        name: cnpg-charts
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
