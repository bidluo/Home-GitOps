# Wire the existing `passwordless` flow onto the default identification stage so
# the login page offers a "Use a passkey" option. Result: a passkey alone logs
# you in (passwordless, single gesture), while username+password remains as the
# fallback — and on a device without the passkey, that path's authenticator
# validation offers your TOTP code. i.e. passkey OR password+TOTP, not both.
#
# This only ADDS the passwordless option; the password path is unchanged, so
# there is no lockout risk from this blueprint. authentik does a full (non-partial)
# update, so the stage's existing fields are restated here to avoid resetting them.
version: 1
metadata:
  name: custom - login - passwordless passkey
entries:
  - model: authentik_stages_identification.identificationstage
    state: present
    identifiers:
      name: default-authentication-identification
    attrs:
      user_fields:
        - email
        - username
      case_insensitive_matching: true
      pretend_user_exists: true
      show_matched_user: true
      passwordless_flow: !Find [authentik_flows.flow, [slug, passwordless]]
