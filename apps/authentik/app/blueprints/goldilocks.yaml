version: 1
metadata:
  name: custom - app - goldilocks
entries:
- model: authentik_providers_proxy.proxyprovider
  state: present
  identifiers:
    name: Goldilocks
  attrs:
    access_token_validity: hours=24
    authentication_flow: !Find [authentik_flows.flow, [slug, default-authentication-flow]]
    authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
    external_host: https://goldilocks.liaw.me
    intercept_header_auth: true
    internal_host: http://goldilocks-dashboard:80
    internal_host_ssl_validation: true
    invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
    mode: proxy
    name: Goldilocks
    property_mappings:
    - !Find [authentik_providers_oauth2.scopemapping, [name, 'authentik default OAuth Mapping: OpenID ''email''']]
    - !Find [authentik_providers_oauth2.scopemapping, [name, 'authentik default OAuth Mapping: Proxy outpost']]
    - !Find [authentik_providers_oauth2.scopemapping, [name, 'authentik default OAuth Mapping: OpenID ''openid''']]
    - !Find [authentik_providers_oauth2.scopemapping, [name, 'authentik default OAuth Mapping: OpenID ''profile''']]
    - !Find [authentik_providers_oauth2.scopemapping, [name, 'authentik default OAuth Mapping: Application Entitlements']]
    refresh_token_validity: days=30
- model: authentik_core.application
  state: present
  identifiers:
    slug: goldilocks
  attrs:
    name: Goldilocks
    policy_engine_mode: any
    provider: !Find [authentik_providers_proxy.proxyprovider, [name, Goldilocks]]
    slug: goldilocks
    meta_icon: https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/png/goldilocks.png
