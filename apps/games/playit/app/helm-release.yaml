---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: playit
spec:
  interval: 5m
  chart:
    spec:
      chart: app-template
      version: 5.0.1
      sourceRef:
        kind: HelmRepository
        name: bjw-s-charts
        namespace: flux-system
  values:
    controllers:
      main:
        containers:
          main:
            image:
              repository: ghcr.io/playit-cloud/playit-agent
              tag: latest
            # Outbound-only: the agent dials playit.gg and forwards inbound
            # tunnel traffic to the local target you set per-tunnel in the
            # playit dashboard (point those at ${LOCAL_LB_IP}:<game-port>).
            env:
              SECRET_KEY:
                valueFrom:
                  secretKeyRef:
                    name: playit-secrets
                    key: SECRET_KEY
            resources:
              requests:
                cpu: 10m
                memory: 32Mi
              limits:
                cpu: 200m
                memory: 128Mi
    service:
      main:
        enabled: false
